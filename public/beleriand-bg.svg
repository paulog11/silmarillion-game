<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Night sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#03020b"/>
      <stop offset="35%"  stop-color="#060818"/>
      <stop offset="70%"  stop-color="#090d1e"/>
      <stop offset="100%" stop-color="#0b0f1c"/>
    </linearGradient>
    <!-- Angband fire glow — northwest horizon -->
    <radialGradient id="angbandGlow" cx="0.08" cy="1.0" r="0.55" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#3d0c04" stop-opacity="0.5"/>
      <stop offset="60%"  stop-color="#1a0502" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a0502" stop-opacity="0"/>
    </radialGradient>
    <!-- Cold Varda starlight glow — northeast -->
    <radialGradient id="starGlow" cx="0.75" cy="0.05" r="0.4" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#a8b8d8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a8b8d8" stop-opacity="0"/>
    </radialGradient>
    <!-- Valley mist -->
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0e1828" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#0e1828" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0e1828" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <!-- Angband fire on northwest horizon -->
  <rect width="1920" height="1080" fill="url(#angbandGlow)"/>
  <!-- Cold starlight northeast -->
  <rect width="1920" height="1080" fill="url(#starGlow)"/>

